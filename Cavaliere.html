<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cavaliere d'Acciaio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; overflow: hidden;
    font-family: 'Georgia', serif;
    touch-action: none;
    user-select: none;
  }
  #gameCanvas {
    display: block;
    image-rendering: pixelated;
    border: 2px solid #444;
    box-shadow: 0 0 40px rgba(200,150,50,0.3);
  }
  #ui {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: min(600px, 100vw);
    pointer-events: none;
  }
  #mobileControls {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: min(600px, 100vw);
    display: flex;
    justify-content: space-between;
    padding: 10px 20px;
    pointer-events: none;
  }
  .ctrl-btn {
    pointer-events: all;
    width: 75px; height: 75px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.5);
    color: white;
    font-size: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
    backdrop-filter: blur(4px);
  }
  .ctrl-btn:active { background: rgba(200,150,50,0.5); }
  #overlay {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: min(600px, 100vw);
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.85);
    color: #e8c87a;
    text-align: center;
    padding: 20px;
  }
  #overlay h1 {
    font-size: clamp(28px, 6vw, 48px);
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(232,200,122,0.8);
    margin-bottom: 10px;
  }
  #overlay p { color: #aaa; margin: 6px 0; font-size: clamp(12px,2.5vw,15px); }
  #overlay .subtitle { color: #e8c87a; font-size: clamp(14px,3vw,18px); margin-bottom: 20px; }
  #startBtn {
    margin-top: 20px;
    padding: 14px 40px;
    font-size: clamp(16px,3.5vw,22px);
    background: linear-gradient(135deg, #8b6914, #e8c87a, #8b6914);
    color: #000;
    border: none;
    cursor: pointer;
    letter-spacing: 3px;
    font-family: 'Georgia', serif;
    font-weight: bold;
    clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
    transition: transform 0.1s;
  }
  #startBtn:active { transform: scale(0.96); }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="mobileControls">
  <button class="ctrl-btn" id="jumpBtn">⬆</button>
  <button class="ctrl-btn" id="attackBtn">⚔</button>
</div>
<div id="overlay">
  <h1>⚔ CAVALIERE D'ACCIAIO ⚔</h1>
  <div class="subtitle">Endless Runner</div>
  <p>📱 Tocca ALTO per saltare</p>
  <p>⚔ Tocca DESTRA per lanciare la spada</p>
  <p>💥 Distruggi 5 nemici → modalità BERSERKER!</p>
  <p>🛡 Colonne: salta! &nbsp; Barili: attacca!</p>
  <button id="startBtn" onclick="game.start()">INIZIA LA CORSA</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

// Responsive canvas
function resize() {
  const maxW = 600, maxH = 340;
  const scale = Math.min(window.innerWidth / maxW, window.innerHeight / (maxH + 110));
  canvas.width = maxW; canvas.height = maxH;
  canvas.style.width = (maxW * scale) + 'px';
  canvas.style.height = (maxH * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ─── CONSTANTS ───────────────────────────────────────────
const W = 600, H = 340;
const GROUND = H - 60;
const GRAVITY = 0.55;
const JUMP_STR = -13.5;
const BASE_SPEED = 4;

// ─── ENTITY BASE ─────────────────────────────────────────
class Entity {
  constructor(x, y, w, h) {
    this.x = x; this.y = y; this.w = w; this.h = h;
    this.active = true;
  }
  getBounds() { return { x: this.x, y: this.y, w: this.w, h: this.h }; }
  overlaps(b) {
    const a = this.getBounds();
    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
  }
}

// ─── PARTICLE ─────────────────────────────────────────────
class Particle extends Entity {
  constructor(x, y, color) {
    super(x, y, Math.random()*5+2, Math.random()*5+2);
    this.vx = (Math.random()-0.5)*8;
    this.vy = Math.random()*-6-2;
    this.color = color;
    this.life = 1.0;
    this.decay = Math.random()*0.04+0.025;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy += 0.25; this.life -= this.decay;
    if (this.life <= 0) this.active = false;
  }
  draw(ox, oy) {
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x+ox, this.y+oy, this.w, this.h);
    ctx.globalAlpha = 1;
  }
}

// ─── SWORD PROJECTILE ─────────────────────────────────────
class Sword extends Entity {
  constructor(x, y) {
    super(x, y, 30, 6);
    this.vx = 10;
    this.returning = false;
    this.owner = null; // ref to knight
    this.trail = [];
  }
  update(knight) {
    this.trail.push({x: this.x, y: this.y});
    if (this.trail.length > 8) this.trail.shift();

    if (!this.returning) {
      this.x += this.vx;
      if (this.x > W + 20) this.returning = true;
    } else {
      const dx = knight.x + knight.w - this.x;
      const dy = (knight.y + knight.h/2) - (this.y + this.h/2);
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist < 20) { this.active = false; return; }
      const spd = 12;
      this.x += (dx/dist)*spd;
      this.y += (dy/dist)*spd;
    }
  }
  draw(ox, oy) {
    // Trail
    for (let i=0;i<this.trail.length;i++) {
      const a = (i/this.trail.length)*0.4;
      ctx.globalAlpha = a;
      ctx.fillStyle = '#f0d060';
      ctx.fillRect(this.trail[i].x+ox, this.trail[i].y+oy+2, 20, 2);
    }
    ctx.globalAlpha = 1;

    // Blade
    ctx.save();
    ctx.translate(this.x+ox + (this.returning ? this.w : 0), this.y+oy + this.h/2);
    ctx.scale(this.returning ? -1 : 1, 1);
    // Handle
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(0, -2, 8, 4);
    // Guard
    ctx.fillStyle = '#888';
    ctx.fillRect(8, -5, 3, 10);
    // Blade
    const grad = ctx.createLinearGradient(11,0,this.w,0);
    grad.addColorStop(0,'#ddd');
    grad.addColorStop(0.5,'#fff');
    grad.addColorStop(1,'#aaa');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(11, -2);
    ctx.lineTo(this.w, 0);
    ctx.lineTo(11, 2);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

// ─── OBSTACLE ─────────────────────────────────────────────
class Obstacle extends Entity {
  constructor(type, x, speed) {
    const configs = {
      barrel:  { w:28, h:32, color:'#8B4513', accent:'#6B3410', destroyable:true },
      cart:    { w:38, h:28, color:'#A0522D', accent:'#7a3e22', destroyable:true },
      column:  { w:22, h:70, color:'#888', accent:'#666', destroyable:false },
      wall:    { w:16, h:55, color:'#777', accent:'#555', destroyable:false },
    };
    const c = configs[type];
    const y = type==='column'||type==='wall' ? GROUND-c.h : GROUND-c.h;
    super(x, y, c.w, c.h);
    this.type = type;
    this.config = c;
    this.speed = speed;
    this.wobble = 0;
  }
  update() {
    this.x -= this.speed;
    if (this.x < -60) this.active = false;
  }
  draw(ox, oy) {
    const x = this.x+ox, y = this.y+oy;
    ctx.save();
    if (this.type==='barrel') this._drawBarrel(x,y);
    else if (this.type==='cart') this._drawCart(x,y);
    else if (this.type==='column') this._drawColumn(x,y);
    else if (this.type==='wall') this._drawWall(x,y);
    ctx.restore();
  }
  _drawBarrel(x,y) {
    // Body
    ctx.fillStyle = this.config.color;
    ctx.beginPath();
    ctx.ellipse(x+this.w/2,y+this.h*0.15,this.w/2-2,6,0,0,Math.PI*2); ctx.fill();
    ctx.fillRect(x+2,y+this.h*0.15,this.w-4,this.h*0.7);
    ctx.beginPath();
    ctx.ellipse(x+this.w/2,y+this.h*0.85,this.w/2-2,6,0,0,Math.PI*2); ctx.fill();
    // Rings
    ctx.strokeStyle='#5a3010'; ctx.lineWidth=2;
    [0.25,0.5,0.75].forEach(t=>{
      ctx.beginPath();
      ctx.ellipse(x+this.w/2,y+this.h*t,this.w/2-2,4,0,0,Math.PI*2); ctx.stroke();
    });
    // Wood lines
    ctx.strokeStyle='#6B3410'; ctx.lineWidth=1;
    for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(x+8+i*7,y+this.h*0.15);ctx.lineTo(x+8+i*7,y+this.h*0.85);ctx.stroke();}
  }
  _drawCart(x,y) {
    ctx.fillStyle='#5a3010';
    ctx.fillRect(x,y+this.h-10,this.w,10); // bed
    ctx.fillStyle=this.config.color;
    ctx.fillRect(x+3,y+8,this.w-6,this.h-18); // box
    ctx.fillStyle='#333';
    // Wheels
    [x+6,x+this.w-12].forEach(wx=>{
      ctx.beginPath(); ctx.arc(wx+4,y+this.h-5,7,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#888'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(wx+4,y+this.h-5,4,0,Math.PI*2); ctx.stroke();
    });
    ctx.strokeStyle='#4a2006'; ctx.lineWidth=1;
    ctx.strokeRect(x+3,y+8,this.w-6,this.h-18);
  }
  _drawColumn(x,y) {
    // Base
    ctx.fillStyle='#666'; ctx.fillRect(x-3,y+this.h-8,this.w+6,8);
    // Body
    const g=ctx.createLinearGradient(x,0,x+this.w,0);
    g.addColorStop(0,'#999'); g.addColorStop(0.4,'#bbb'); g.addColorStop(1,'#777');
    ctx.fillStyle=g; ctx.fillRect(x+2,y+8,this.w-4,this.h-16);
    // Cap
    ctx.fillStyle='#aaa'; ctx.fillRect(x-3,y,this.w+6,8);
    // Details
    ctx.strokeStyle='#555'; ctx.lineWidth=0.5;
    for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(x+5+i*6,y+8);ctx.lineTo(x+5+i*6,y+this.h-8);ctx.stroke();}
  }
  _drawWall(x,y) {
    const brickH=12, brickW=this.w;
    for(let row=0;row<Math.ceil(this.h/brickH);row++){
      const by=y+this.h-brickH*(row+1);
      ctx.fillStyle=row%2===0?'#777':'#666';
      ctx.fillRect(x,by,brickW,brickH-1);
      ctx.strokeStyle='#444'; ctx.lineWidth=0.5;
      ctx.strokeRect(x,by,brickW,brickH-1);
    }
  }
}

// ─── KNIGHT ───────────────────────────────────────────────
class Knight extends Entity {
  constructor() {
    super(80, GROUND-52, 28, 52);
    this.vy = 0;
    this.onGround = false;
    this.jumpBuffer = 0;
    this.frame = 0;
    this.frameTimer = 0;
    this.legPhase = 0;
    this.alive = true;
    this.invincible = 0;
    this.berserker = 0;
    this.comboCount = 0;
    this.hitFlash = 0;
  }
  jump() {
    if (this.onGround) {
      this.vy = JUMP_STR;
      this.onGround = false;
    } else {
      this.jumpBuffer = 8; // coyote time
    }
  }
  update() {
    // Physics
    this.vy += GRAVITY;
    this.y += this.vy;
    if (this.y >= GROUND - this.h) {
      this.y = GROUND - this.h;
      this.vy = 0;
      this.onGround = true;
      if (this.jumpBuffer > 0) { this.jump(); this.jumpBuffer = 0; }
    } else {
      this.onGround = false;
    }
    if (this.jumpBuffer > 0) this.jumpBuffer--;
    if (this.invincible > 0) this.invincible--;
    if (this.berserker > 0) this.berserker--;
    if (this.hitFlash > 0) this.hitFlash--;

    // Animate legs
    if (this.onGround) {
      this.frameTimer++;
      const spd = this.berserker > 0 ? 4 : 6;
      if (this.frameTimer >= spd) { this.legPhase = (this.legPhase+1)%4; this.frameTimer=0; }
    }
  }
  draw(ox, oy) {
    const x = this.x+ox, y = this.y+oy;
    const flash = this.hitFlash > 0 && Math.floor(this.hitFlash/3)%2===0;
    const berserk = this.berserker > 0;
    ctx.save();
    if (flash) { ctx.globalAlpha=0.5; }

    // Glow in berserker mode
    if (berserk) {
      ctx.shadowColor='#ff4400'; ctx.shadowBlur=15;
    }

    // ── LEGS ──
    const legColors = ['#555','#666'];
    const legAnim = [[0,0],[3,-3],[0,0],[-3,3]];
    const la = legAnim[this.legPhase];
    // Left leg
    ctx.fillStyle=legColors[0];
    ctx.fillRect(x+4, y+this.h-18, 9, 18);
    // Boot left
    ctx.fillStyle='#333'; ctx.fillRect(x+2+la[0], y+this.h-6, 12, 6);
    // Right leg
    ctx.fillStyle=legColors[1];
    ctx.fillRect(x+15, y+this.h-18, 9, 18);
    // Boot right
    ctx.fillStyle='#333'; ctx.fillRect(x+13+la[1], y+this.h-6, 12, 6);

    // ── BODY / ARMOR ──
    const bodyGrad = ctx.createLinearGradient(x,y+14,x+this.w,y+14);
    bodyGrad.addColorStop(0,berserk?'#882200':'#555');
    bodyGrad.addColorStop(0.4,berserk?'#cc3300':'#888');
    bodyGrad.addColorStop(1,berserk?'#882200':'#444');
    ctx.fillStyle=bodyGrad;
    ctx.fillRect(x+2, y+14, this.w-4, this.h-32);
    // Chest plate highlight
    ctx.fillStyle=berserk?'rgba(255,80,0,0.3)':'rgba(255,255,255,0.12)';
    ctx.fillRect(x+6, y+17, 10, 12);
    // Belt
    ctx.fillStyle='#333'; ctx.fillRect(x+2, y+this.h-24, this.w-4, 5);

    // ── ARMS ──
    // Shield arm (left)
    ctx.fillStyle='#666'; ctx.fillRect(x-5, y+16, 8, 18);
    ctx.fillStyle='#4a4'; ctx.fillRect(x-9, y+15, 5, 22); // small shield

    // Sword arm (right) - holding sword at side
    ctx.fillStyle='#666'; ctx.fillRect(x+this.w-3, y+16, 8, 18);
    // Sword hilt at waist
    ctx.fillStyle='#8B4513'; ctx.fillRect(x+this.w+4, y+this.h-28, 4, 8);
    ctx.fillStyle='#aaa'; ctx.fillRect(x+this.w+3, y+this.h-25, 6, 2);

    // ── HEAD / HELMET ──
    // Helmet body
    const helmGrad = ctx.createLinearGradient(x+4,y,x+this.w-4,y+14);
    helmGrad.addColorStop(0,berserk?'#aa2200':'#666');
    helmGrad.addColorStop(0.5,berserk?'#dd4400':'#999');
    helmGrad.addColorStop(1,berserk?'#aa2200':'#555');
    ctx.fillStyle=helmGrad;
    ctx.beginPath();
    ctx.roundRect(x+4, y, this.w-8, 15, [5,5,0,0]);
    ctx.fill();
    // Visor
    ctx.fillStyle='#222'; ctx.fillRect(x+6, y+6, this.w-12, 5);
    ctx.fillStyle='rgba(100,200,255,0.3)'; ctx.fillRect(x+7, y+7, this.w-14, 3);
    // Cheek guards
    ctx.fillStyle='#555';
    ctx.fillRect(x+4,y+9,4,6); ctx.fillRect(x+this.w-8,y+9,4,6);

    // ── PLUME (pennacchio rosso) ──
    const plumeX = x + this.w/2;
    ctx.strokeStyle=berserk?'#ff6600':'#cc2200';
    ctx.lineWidth=2.5;
    for(let i=0;i<5;i++){
      const wave = Math.sin(Date.now()/200+i*0.8)*2;
      ctx.beginPath();
      ctx.moveTo(plumeX-4+i*2, y);
      ctx.quadraticCurveTo(plumeX-2+i*2, y-6+wave, plumeX-1+i*2, y-12+wave);
      ctx.stroke();
    }

    // Berserker aura
    if (berserk) {
      ctx.globalAlpha=0.15+0.1*Math.sin(Date.now()/100);
      ctx.fillStyle='#ff4400';
      ctx.fillRect(x-5,y-5,this.w+10,this.h+5);
      ctx.globalAlpha=1;
    }

    ctx.restore();
  }
}

// ─── PARALLAX LAYER ───────────────────────────────────────
class ParallaxLayer {
  constructor(speed, drawFn) { this.offset=0; this.speed=speed; this.drawFn=drawFn; }
  update(gameSpeed) { this.offset=(this.offset+this.speed*gameSpeed)%W; }
  draw() { this.drawFn(this.offset); }
}

// ─── GAME ─────────────────────────────────────────────────
class Game {
  constructor() {
    this.state = 'menu'; // menu | playing | dead
    this.knight = null;
    this.obstacles = [];
    this.particles = [];
    this.swords = [];
    this.score = 0;
    this.hiScore = parseInt(localStorage.getItem('caScore')||'0');
    this.speed = BASE_SPEED;
    this.spawnTimer = 0;
    this.spawnInterval = 90;
    this.shakeX = 0; this.shakeY = 0;
    this.shakePower = 0;
    this.combo = 0;
    this.berserkerTimer = 0;
    this.swordCooldown = 0;
    this.layers = this._buildLayers();
    this._bindInput();
    this._loop();
  }

  _buildLayers() {
    // Stars
    const stars = Array.from({length:80},()=>({
      x:Math.random()*W, y:Math.random()*(H*0.5),
      r:Math.random()*1.5+0.5, twinkle:Math.random()*Math.PI*2
    }));

    const layer0 = new ParallaxLayer(0.05, (off)=>{
      // Night sky gradient
      const sky=ctx.createLinearGradient(0,0,0,H*0.65);
      sky.addColorStop(0,'#05060f'); sky.addColorStop(1,'#0d0f2a');
      ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*0.65);
      // Stars
      stars.forEach(s=>{
        s.twinkle+=0.02;
        const a=0.5+0.5*Math.sin(s.twinkle);
        ctx.globalAlpha=a;
        ctx.fillStyle='#e8e8ff';
        ctx.beginPath(); ctx.arc((s.x-off+W)%W,s.y,s.r,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;
      // Moon
      ctx.fillStyle='#fffde0';
      ctx.beginPath(); ctx.arc(520,40,22,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#e8e090';
      ctx.beginPath(); ctx.arc(532,36,20,0,Math.PI*2); ctx.fill(); // crescent
    });

    // Castle silhouette
    const castleSegs = Array.from({length:6},(_,i)=>({x:i*120+Math.random()*60}));
    const layer1 = new ParallaxLayer(0.2, (off)=>{
      ctx.fillStyle='#0f1020';
      castleSegs.forEach(cs=>{
        const bx=(cs.x-off*0.5+W*2)%(W+200)-60;
        // Castle wall
        ctx.fillRect(bx,H*0.35,80,H*0.3);
        // Battlements
        for(let b=0;b<4;b++) ctx.fillRect(bx+b*22,H*0.35-12,14,12);
        // Tower
        ctx.fillRect(bx+25,H*0.2,30,H*0.16);
        ctx.beginPath(); // pointy top
        ctx.moveTo(bx+25,H*0.2); ctx.lineTo(bx+40,H*0.1); ctx.lineTo(bx+55,H*0.2);
        ctx.closePath(); ctx.fill();
        // Window
        ctx.fillStyle='rgba(255,200,50,0.4)'; ctx.fillRect(bx+34,H*0.22,12,10);
        ctx.fillStyle='#0f1020';
      });
    });

    // Mid-ground misty hills
    const layer2 = new ParallaxLayer(0.5, (off)=>{
      ctx.fillStyle='#141830';
      ctx.beginPath(); ctx.moveTo(0,H*0.55);
      for(let x=0;x<=W;x+=8){
        const nx=(x+off)%(W);
        const ny=H*0.55+Math.sin(nx*0.015)*18+Math.sin(nx*0.04)*8;
        x===0?ctx.moveTo(x,ny):ctx.lineTo(x,ny);
      }
      ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();
    });

    // Ground
    const layer3 = new ParallaxLayer(1.0, (off)=>{
      // Ground base
      const gGrad=ctx.createLinearGradient(0,GROUND,0,H);
      gGrad.addColorStop(0,'#2a2218'); gGrad.addColorStop(1,'#1a1510');
      ctx.fillStyle=gGrad; ctx.fillRect(0,GROUND,W,H-GROUND);
      // Stone tiles
      const tileW=40;
      for(let i=-1;i<=W/tileW+1;i++){
        const tx=((i*tileW)-off%tileW+tileW)%W - tileW/2;
        ctx.strokeStyle='#3a3028'; ctx.lineWidth=1;
        ctx.strokeRect(tx,GROUND,tileW,H-GROUND);
        // Highlight
        ctx.fillStyle='rgba(255,255,255,0.03)';
        ctx.fillRect(tx+1,GROUND+1,tileW-2,4);
      }
      // Edge highlight
      ctx.fillStyle='#4a3a28';
      ctx.fillRect(0,GROUND,W,3);
    });

    return [layer0, layer1, layer2, layer3];
  }

  _bindInput() {
    // Keyboard
    window.addEventListener('keydown', e=>{
      if(this.state!=='playing') return;
      if(e.key==='ArrowUp'||e.key===' ') { e.preventDefault(); this.knight.jump(); }
      if(e.key==='ArrowRight') { e.preventDefault(); this._attack(); }
    });

    // Touch: tap upper half = jump, lower half = attack
    canvas.addEventListener('touchstart', e=>{
      e.preventDefault();
      if(this.state==='dead') { this.start(); return; }
      if(this.state!=='playing') return;
      Array.from(e.changedTouches).forEach(t=>{
        const rect=canvas.getBoundingClientRect();
        const ty=(t.clientY-rect.top)/rect.height;
        if(ty<0.5) this.knight.jump();
        else this._attack();
      });
    }, {passive:false});

    // Mobile buttons
    document.getElementById('jumpBtn').addEventListener('touchstart', e=>{
      e.preventDefault(); e.stopPropagation();
      if(this.state==='playing') this.knight.jump();
    }, {passive:false});
    document.getElementById('attackBtn').addEventListener('touchstart', e=>{
      e.preventDefault(); e.stopPropagation();
      if(this.state==='playing') this._attack();
    }, {passive:false});

    // Mouse fallback for buttons
    document.getElementById('jumpBtn').addEventListener('mousedown', e=>{
      if(this.state==='playing') this.knight.jump();
    });
    document.getElementById('attackBtn').addEventListener('mousedown', e=>{
      if(this.state==='playing') this._attack();
    });
  }

  _attack() {
    if(this.swordCooldown > 0) return;
    const k=this.knight;
    const s=new Sword(k.x+k.w, k.y+k.h/2-3);
    this.swords.push(s);
    this.swordCooldown = 50;
  }

  start() {
    this.state='playing';
    this.knight=new Knight();
    this.obstacles=[]; this.particles=[]; this.swords=[];
    this.score=0; this.speed=BASE_SPEED;
    this.spawnTimer=0; this.spawnInterval=90;
    this.combo=0; this.swordCooldown=0;
    overlay.style.display='none';
  }

  _spawnObstacle() {
    const isBerserker = this.knight && this.knight.berserker>0;
    // Weighted pool
    const pool=['barrel','barrel','barrel','cart','cart','column','column','wall'];
    const type=pool[Math.floor(Math.random()*pool.length)];
    this.obstacles.push(new Obstacle(type, W+30, this.speed));
  }

  _shake(power) {
    this.shakePower=Math.max(this.shakePower, power);
  }

  _burst(x,y,count,color) {
    for(let i=0;i<count;i++) this.particles.push(new Particle(x,y,color));
    this._shake(4);
  }

  _gameOver() {
    this.state='dead';
    if(this.score>this.hiScore){this.hiScore=this.score;localStorage.setItem('caScore',this.hiScore);}
    this._showOverlay(true);
  }

  _showOverlay(dead=false) {
    overlay.style.display='flex';
    overlay.innerHTML=dead?`
      <h1>⚔ CADUTO ⚔</h1>
      <div class="subtitle">Il cavaliere è caduto</div>
      <p>Punteggio: <strong style="color:#e8c87a">${this.score}</strong></p>
      <p>Record: <strong style="color:#e8c87a">${this.hiScore}</strong></p>
      <button id="startBtn" onclick="game.start()">RIPROVA</button>
    `:`
      <h1>⚔ CAVALIERE D'ACCIAIO ⚔</h1>
      <div class="subtitle">Endless Runner</div>
      <p>📱 Tocca ALTO per saltare</p>
      <p>⚔ Tocca BASSO o il pulsante ⚔ per lanciare la spada</p>
      <p>💥 Distruggi 5 → BERSERKER!</p>
      <button id="startBtn" onclick="game.start()">INIZIA LA CORSA</button>
    `;
  }

  update() {
    if(this.state!=='playing') return;
    const k=this.knight;
    const berserk=k.berserker>0;

    // Speed ramp
    this.speed = BASE_SPEED + this.score*0.001 + (berserk?2:0);

    // Update parallax
    this.layers.forEach(l=>l.update(this.speed/BASE_SPEED));

    // Update knight
    k.update();

    // Sword cooldown
    if(this.swordCooldown>0) this.swordCooldown--;

    // Spawn obstacles
    this.spawnTimer++;
    const si=Math.max(45, this.spawnInterval - this.score*0.02);
    if(this.spawnTimer>=si){
      this._spawnObstacle(); this.spawnTimer=0;
      // Sometimes double obstacle
      if(Math.random()<0.15) setTimeout(()=>this._spawnObstacle(),300);
    }

    // Update obstacles
    this.obstacles.forEach(o=>{
      o.speed=this.speed; o.update();
    });

    // Update swords
    this.swords.forEach(s=>{ if(s.active) s.update(k); });

    // Sword vs obstacles
    this.swords.forEach(sw=>{
      if(!sw.active) return;
      this.obstacles.forEach(ob=>{
        if(!ob.active) return;
        if(sw.overlaps(ob.getBounds())){
          if(ob.config.destroyable){
            ob.active=false;
            this._burst(ob.x+ob.w/2, ob.y+ob.h/2, 14,
              ob.type==='barrel'?'#8B4513':ob.type==='cart'?'#A0522D':'#888');
            this.combo++;
            this.score+=10+(this.combo>4?20:0);
            if(this.combo>=5&&k.berserker<=0){
              k.berserker=300; k.comboCount=0;
              this._burst(k.x+k.w/2, k.y, 25,'#ff6600');
            }
          }
        }
      });
    });

    // Knight vs obstacles (only if not invincible)
    if(k.invincible<=0){
      this.obstacles.forEach(ob=>{
        if(!ob.active) return;
        if(k.overlaps(ob.getBounds())){
          if(berserk && ob.config.destroyable){
            ob.active=false;
            this._burst(ob.x+ob.w/2,ob.y+ob.h/2,12,'#ff4400');
            this.score+=5;
          } else {
            // HIT
            k.invincible=90; k.hitFlash=30;
            this.combo=0; k.berserker=0;
            this._burst(k.x+k.w/2, k.y+k.h/2, 18,'#cc0000');
            this._shake(8);
            ob.active=false;
            // Second hit = die
            if(k.invincible<=0||this._lives===0){
              this._gameOver(); return;
            }
            this._lives=(this._lives||2)-1;
            if(this._lives<=0) this._gameOver();
          }
        }
      });
    }

    // Update particles
    this.particles.forEach(p=>p.update());

    // Score
    this.score++;

    // Cleanup
    this.obstacles=this.obstacles.filter(o=>o.active);
    this.particles=this.particles.filter(p=>p.active);
    this.swords=this.swords.filter(s=>s.active);

    // Screen shake decay
    if(this.shakePower>0){
      this.shakeX=(Math.random()-0.5)*this.shakePower;
      this.shakeY=(Math.random()-0.5)*this.shakePower;
      this.shakePower*=0.8;
      if(this.shakePower<0.5){this.shakePower=0;this.shakeX=0;this.shakeY=0;}
    }
  }

  draw() {
    ctx.clearRect(0,0,W,H);
    const ox=this.shakeX, oy=this.shakeY;

    // Parallax layers
    this.layers.forEach(l=>l.draw());

    // Entities
    this.obstacles.forEach(o=>o.draw(ox,oy));
    this.particles.forEach(p=>p.draw(ox,oy));
    this.swords.forEach(s=>s.draw(ox,oy));
    if(this.knight) this.knight.draw(ox,oy);

    if(this.state==='playing') this._drawHUD();
  }

  _drawHUD() {
    const k=this.knight;
    // Score
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(8,8,140,28);
    ctx.fillStyle='#e8c87a';
    ctx.font='bold 14px Georgia';
    ctx.fillText(`⚔ ${this.score}`, 16, 27);
    ctx.fillStyle='#aaa';
    ctx.font='11px Georgia';
    ctx.fillText(`REC: ${this.hiScore}`, 90, 27);

    // Combo
    if(this.combo>0){
      const alpha=Math.min(1,this.combo/5);
      ctx.fillStyle=`rgba(255,${100+this.combo*30},0,${alpha})`;
      ctx.font=`bold ${14+this.combo}px Georgia`;
      ctx.fillText(`COMBO x${this.combo}`, W-120, 27);
    }

    // Berserker mode
    if(k&&k.berserker>0){
      const t=k.berserker/300;
      ctx.fillStyle='rgba(0,0,0,0.6)';
      ctx.fillRect(W/2-80, 8, 160, 20);
      ctx.fillStyle=`rgba(255,${Math.floor(100+155*t)},0,0.9)`;
      ctx.fillRect(W/2-78, 10, 156*t, 16);
      ctx.fillStyle='#ff6600';
      ctx.font='bold 11px Georgia';
      ctx.textAlign='center';
      ctx.fillText('🔥 BERSERKER 🔥', W/2, 23);
      ctx.textAlign='left';
    }

    // Sword cooldown indicator
    if(this.swordCooldown>0){
      const t=this.swordCooldown/50;
      ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.fillRect(8, H-45, 50, 8);
      ctx.fillStyle='rgba(150,200,255,0.8)';
      ctx.fillRect(8, H-45, 50*(1-t), 8);
      ctx.fillStyle='#aaa'; ctx.font='9px Arial';
      ctx.fillText('⚔ RICARICA', 8, H-50);
    }

    // Invincibility flash
    if(k&&k.invincible>0&&Math.floor(k.invincible/8)%2===0){
      ctx.fillStyle='rgba(255,0,0,0.15)';
      ctx.fillRect(0,0,W,H);
    }

    // Obstacle type hints
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.font='9px Arial';
    this.obstacles.forEach(o=>{
      if(o.x>W-180&&o.x<W){
        const hint=o.config.destroyable?'⚔':'↑';
        const hc=o.config.destroyable?'#ffdd88':'#88aaff';
        ctx.fillStyle=hc;
        ctx.fillText(hint, o.x+o.w/2-3, o.y-5);
      }
    });
  }

  _loop() {
    this.update();
    this.draw();
    requestAnimationFrame(()=>this._loop());
  }
}

// ─── BOOT ─────────────────────────────────────────────────
// Polyfill roundRect for older browsers
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    const rad=Array.isArray(r)?r[0]:r;
    this.beginPath();
    this.moveTo(x+rad,y);
    this.lineTo(x+w-rad,y);
    this.quadraticCurveTo(x+w,y,x+w,y+rad);
    this.lineTo(x+w,y+h-rad);
    this.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);
    this.lineTo(x+rad,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-rad);
    this.lineTo(x,y+rad);
    this.quadraticCurveTo(x,y,x+rad,y);
    this.closePath();
    return this;
  };
}

const game = new Game();
</script>
