<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Coccinella</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0d0020;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
}
canvas {
  display:block;
  border-radius:24px;
  box-shadow:
    0 0 0 3px #ff6bbd,
    0 0 40px rgba(255,107,189,0.6),
    0 0 100px rgba(168,85,247,0.3),
    0 30px 80px rgba(0,0,0,0.6);
  cursor:pointer;
}
</style>
</head>
<body>
<canvas id="c" width="420" height="640"></canvas>
<script>
(function() {
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var W = 420, H = 640;

  /* ── EMOJI ── */
  var EMOJIS = [
    '😀','😂','🤣','😍','🥰','😎','🤩','😜','🤪','😏',
    '🥳','😤','😡','🤬','😱','😨','😰','🥶','🥵','😴',
    '🤢','🤮','🤧','😷','🤒','🤕','🤓','🧐','😒','😞',
    '😔','😟','😕','🙁','😣','😖','😫','😩','🥺','😭',
    '😠','😈','👿','💀','🤡','👻','👽','🤖','💩','🙈',
    '🙉','🙊','🐸','🐵','🦊','🐺','🦁','🐯','🐻','🐼',
    '🐨','🐙','🦋','🌝','🌚','🌞','🍕','🍔','🌮','🍦',
    '🎃','🎯','🎮','🎲','🚀','🛸','🌈','⚡','🔥','💥',
    '🌊','💫','✨','🌟','⚽','🏀','🎾','🏆','🥇',
    '🎨','🎬','🎭','🎪','🧨','🏅','👾','🦄','🧠','🎵',
  ];

  /* ── SFONDO ── */
  var STARS = [];
  for (var i = 0; i < 130; i++) {
    STARS.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.8 + 0.3,
      phase: Math.random() * Math.PI * 2,
      spd: 0.4 + Math.random() * 0.8
    });
  }
  var NEBULAE = [];
  for (var i = 0; i < 5; i++) {
    NEBULAE.push({
      x: Math.random() * W, y: Math.random() * H,
      rx: 70 + Math.random() * 90, ry: 40 + Math.random() * 60,
      hue: Math.random() < 0.5 ? 280 : 320,
      a: 0.04 + Math.random() * 0.07,
      ang: Math.random() * Math.PI
    });
  }

  /* ── STATO ── */
  var state = 'menu';
  var score = 0;
  var bestScore = 0;
  try { bestScore = parseInt(localStorage.getItem('flappyBest') || '0') || 0; } catch(e) {}
  var frame = 0;
  var lives = 3;
  var deathTimer = 0;
  var deathEmoji = '😵';
  var deathTitle = 'Coccinella K.O.!';
  var killerTxt = '';

  /* ── UCCELLO ── */
  var Bx = 110, By = 300, Bvy = 0, Br = 16, Brot = 0, Binv = 0, Bwing = 0;

  /* ── COLONNE ── */
  var GAP = 205, PW = 68;
  var SPD_BASE = 2.5, pipeSpeed = SPD_BASE;
  var pipes = [], pipeTimer = 0, PIPE_EVERY = 253;

  /* ── PARTICELLE ── */
  var particles = [];

  /* ── HELPERS ── */
  function rndEmoji() { return EMOJIS[Math.floor(Math.random() * EMOJIS.length)]; }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawText(str, x, y, sz, col, shadowCol, shadowBlur) {
    ctx.save();
    ctx.font = sz + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (shadowCol) {
      ctx.fillStyle = shadowCol;
      ctx.shadowColor = shadowCol;
      ctx.shadowBlur = shadowBlur || 6;
      ctx.fillText(str, x + 2, y + 3);
      ctx.shadowBlur = 0;
    }
    ctx.fillStyle = col;
    ctx.fillText(str, x, y);
    ctx.restore();
  }

  function spawnPart(x, y, col, n, spd) {
    for (var k = 0; k < n; k++) {
      var ang = Math.random() * Math.PI * 2;
      var s = spd * (0.5 + Math.random());
      particles.push({
        x: x, y: y,
        vx: Math.cos(ang) * s, vy: Math.sin(ang) * s,
        life: 1, decay: 0.03 + Math.random() * 0.04,
        sz: 3 + Math.random() * 7, col: col
      });
    }
  }

  /* ── SPAGNA PIPE ── */
  function spawnPipe() {
    var minY = 90, maxY = H - 90 - GAP;
    var gapY = minY + Math.random() * (maxY - minY);
    var e1 = rndEmoji(), e2;
    do { e2 = rndEmoji(); } while (e2 === e1);
    pipes.push({
      x: W + 10,
      topH: gapY,
      botY: gapY + GAP,
      botH: H - (gapY + GAP),
      e1: e1, e2: e2,
      scored: false,
      wobble: 0
    });
  }

  /* ── GAME FLOW ── */
  function startGame() {
    score = 0; lives = 3; pipeSpeed = SPD_BASE;
    pipes = []; pipeTimer = 0; particles = [];
    deathTimer = 0; state = 'playing';
    Bx = 110; By = 300; Bvy = 0; Brot = 0; Binv = 0; Bwing = 0;
  }

  function handleHit() {
    lives--;
    Binv = 90; Bvy = -4.5;
    spawnPart(Bx, By, '#ff6bbd', 18, 4);
    if (lives <= 0) handleDeath();
  }

  function handleDeath() {
    if (state === 'dead') return;
    state = 'dead'; deathTimer = 0;
    if (score > bestScore) {
      bestScore = score;
      try { localStorage.setItem('flappyBest', bestScore); } catch(e) {}
    }
    spawnPart(Bx, By, '#ff6bbd', 28, 6);
    spawnPart(Bx, By, '#ffd700', 18, 8);
    var msgs = [
      {e:'😵',t:'Coccinella K.O.!'}, {e:'💀',t:'Che botta!'},
      {e:'😱',t:'Nooooo!'}, {e:'🤕',t:'Ahia ahia!'},
      {e:'😭',t:'Ci risiamo...'}, {e:'🤡',t:'Ops!'},
    ];
    var m = msgs[Math.floor(Math.random() * msgs.length)];
    deathEmoji = m.e; deathTitle = m.t;
    killerTxt = '';
    for (var k = 0; k < pipes.length; k++) {
      if (pipes[k].x < Bx + 100 && pipes[k].x + PW > Bx - 40) {
        killerTxt = 'Colpita da ' + pipes[k].e1 + '  ' + pipes[k].e2;
        break;
      }
    }
  }

  function checkColl(p) {
    var br = Br - 5;
    if (Bx + br < p.x || Bx - br > p.x + PW) return false;
    return (By - br < p.topH) || (By + br > p.botY);
  }

  /* ══════════════════════════════════════════════════
     DISEGNO
  ══════════════════════════════════════════════════ */

  function drawBG() {
    var sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#0d0020');
    sky.addColorStop(0.5, '#1a0533');
    sky.addColorStop(1, '#2d0a5e');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    for (var ni = 0; ni < NEBULAE.length; ni++) {
      var n = NEBULAE[ni];
      ctx.save();
      ctx.translate(n.x, n.y);
      ctx.rotate(n.ang);
      ctx.scale(n.rx, n.ry);
      var g = ctx.createRadialGradient(0, 0, 0, 0, 0, 1);
      g.addColorStop(0, 'hsla(' + n.hue + ',100%,70%,' + (n.a * 1.5) + ')');
      g.addColorStop(1, 'hsla(' + n.hue + ',100%,40%,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(0, 0, 1, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    var t = frame * 0.018;
    for (var si = 0; si < STARS.length; si++) {
      var s = STARS[si];
      ctx.globalAlpha = 0.35 + 0.65 * Math.abs(Math.sin(s.phase + t * s.spd));
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  /* ── CORPO COLONNA ── */
  function drawPipeBody(x, y, w, h, wb) {
    var gr = ctx.createLinearGradient(x, 0, x + w, 0);
    gr.addColorStop(0,    '#1e0840');
    gr.addColorStop(0.3,  '#4c1d95');
    gr.addColorStop(0.65, '#7c3aed');
    gr.addColorStop(1,    '#3b0764');
    ctx.fillStyle = gr;
    roundRect(x, y, w, h, 12);
    ctx.fill();

    /* strisce */
    ctx.save();
    roundRect(x, y, w, h, 12); ctx.clip();
    ctx.strokeStyle = 'rgba(167,139,250,0.18)';
    ctx.lineWidth = 1;
    for (var li = y + 10; li < y + h - 10; li += 14) {
      ctx.beginPath(); ctx.moveTo(x + 10, li); ctx.lineTo(x + w - 10, li); ctx.stroke();
    }
    ctx.restore();

    /* bordo */
    if (wb > 0.05) {
      ctx.strokeStyle = 'rgba(255,107,189,' + (wb * 0.9) + ')';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#ff6bbd';
      ctx.shadowBlur = 18;
    } else {
      ctx.strokeStyle = '#a78bfa';
      ctx.lineWidth = 1.5;
      ctx.shadowColor = '#a855f7';
      ctx.shadowBlur = 8;
    }
    roundRect(x, y, w, h, 12); ctx.stroke();
    ctx.shadowBlur = 0;
  }

  /* ── CAPPUCCIO COLONNA ── */
  function drawPipeCap(x, cy, w) {
    var cg = ctx.createLinearGradient(0, cy - 9, 0, cy + 9);
    cg.addColorStop(0, '#e9d5ff');
    cg.addColorStop(0.4, '#c084fc');
    cg.addColorStop(1, '#7c3aed');
    ctx.fillStyle = cg;
    roundRect(x - 5, cy - 9, w + 10, 18, 7); ctx.fill();
    ctx.strokeStyle = '#f5d0fe'; ctx.lineWidth = 1.2;
    roundRect(x - 5, cy - 9, w + 10, 18, 7); ctx.stroke();
  }

  /* ── COLONNA COMPLETA ── */
  function drawPipe(p) {
    var wb = p.wobble;
    var sx = (wb > 0.02) ? Math.sin(frame * 1.1) * wb * 7 : 0;

    ctx.save();
    ctx.translate(sx, 0);

    /* superiore */
    drawPipeBody(p.x, 0, PW, p.topH, wb);
    drawPipeCap(p.x, p.topH, PW);

    /* emoji superiore — capovolta */
    ctx.save();
    ctx.translate(p.x + PW / 2, p.topH - 40);
    ctx.rotate(Math.PI);
    ctx.font = '36px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.9)';
    ctx.shadowBlur = 12;
    ctx.fillText(p.e1, 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();

    /* inferiore */
    drawPipeBody(p.x, p.botY, PW, p.botH, wb);
    drawPipeCap(p.x, p.botY, PW);

    /* emoji inferiore — dritta */
    ctx.save();
    ctx.translate(p.x + PW / 2, p.botY + 40);
    ctx.font = '36px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.9)';
    ctx.shadowBlur = 12;
    ctx.fillText(p.e2, 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();

    ctx.restore();
  }

  /* ── COCCINELLA ── */
  function drawBird() {
    ctx.save();
    ctx.translate(Bx, By);
    ctx.rotate(Brot);
    if (Binv > 0 && Math.floor(Binv / 4) % 2 === 0) ctx.globalAlpha = 0.2;

    var wf = Math.sin(Bwing) * 0.5;

    /* ala superiore */
    ctx.save();
    ctx.translate(-Br * 0.5, 0);
    ctx.scale(1, 1 + wf * 0.4);
    ctx.fillStyle = 'rgba(255,107,189,0.55)';
    ctx.strokeStyle = 'rgba(255,107,189,0.9)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.ellipse(-11, 4, 15, 8, 0.6, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    ctx.restore();

    /* ala inferiore */
    ctx.save();
    ctx.translate(-Br * 0.5, 0);
    ctx.scale(1, -(1 + wf * 0.4));
    ctx.fillStyle = 'rgba(255,107,189,0.55)';
    ctx.strokeStyle = 'rgba(255,107,189,0.9)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.ellipse(-11, 4, 15, 8, 0.6, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    ctx.restore();

    /* glow */
    ctx.shadowColor = '#ff6bbd'; ctx.shadowBlur = 20;

    /* corpo */
    ctx.fillStyle = '#e8003d';
    ctx.beginPath(); ctx.ellipse(0, 0, Br, Br * 0.9, 0, 0, Math.PI * 2); ctx.fill();

    /* striscia */
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.ellipse(0, 0, 4, Br * 0.9, 0, 0, Math.PI * 2); ctx.fill();

    /* macchie */
    ctx.fillStyle = '#1a1a1a';
    var spots = [[-8,-9,6],[4,-13,5],[-13,3,5],[6,6,6],[-5,11,4]];
    for (var si = 0; si < spots.length; si++) {
      ctx.beginPath(); ctx.arc(spots[si][0], spots[si][1], spots[si][2], 0, Math.PI * 2); ctx.fill();
    }

    /* testa */
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.ellipse(Br * 0.58, -Br * 0.52, Br * 0.52, Br * 0.44, -0.4, 0, Math.PI * 2);
    ctx.fill();

    /* occhio */
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(Br * 0.63, -Br * 0.50, 7, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(Br * 0.70, -Br * 0.46, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(Br * 0.74, -Br * 0.52, 1.5, 0, Math.PI * 2); ctx.fill();

    /* antenne */
    var aw = Math.sin(frame * 0.18) * 4;
    ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(Br * 0.45, -Br * 0.82);
    ctx.quadraticCurveTo(Br * 0.9 + aw, -Br * 1.4, Br * 1.1 + aw * 1.2, -Br * 1.62);
    ctx.stroke();
    ctx.fillStyle = '#ff6bbd'; ctx.shadowColor = '#ff6bbd'; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(Br * 1.1 + aw * 1.2, -Br * 1.62, 3.5, 0, Math.PI * 2); ctx.fill();

    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.moveTo(Br * 0.28, -Br * 0.87);
    ctx.quadraticCurveTo(Br * 0.5 - aw, -Br * 1.48, Br * 0.38 - aw * 1.2, -Br * 1.68);
    ctx.stroke();
    ctx.fillStyle = '#ff6bbd'; ctx.shadowColor = '#ff6bbd'; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(Br * 0.38 - aw * 1.2, -Br * 1.68, 3.5, 0, Math.PI * 2); ctx.fill();

    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  /* ── MENU ── */
  function drawMenu() {
    var cx = W / 2, cy = H / 2 + 10;

    var g = ctx.createLinearGradient(cx - 155, cy - 170, cx + 155, cy + 170);
    g.addColorStop(0, 'rgba(45,10,94,0.96)');
    g.addColorStop(1, 'rgba(20,4,50,0.97)');
    ctx.fillStyle = g;
    roundRect(cx - 160, cy - 175, 320, 350, 24); ctx.fill();
    ctx.strokeStyle = '#ff6bbd'; ctx.lineWidth = 2.5;
    ctx.shadowColor = '#ff6bbd'; ctx.shadowBlur = 22;
    roundRect(cx - 160, cy - 175, 320, 350, 24); ctx.stroke();
    ctx.shadowBlur = 0;

    var bob = Math.sin(frame * 0.055) * 6;
    ctx.save();
    ctx.translate(cx, cy - 108 + bob);
    ctx.rotate(Math.sin(frame * 0.055) * 0.1);
    ctx.font = '70px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#ff6bbd'; ctx.shadowBlur = 20;
    ctx.fillStyle = '#fff'; ctx.fillText('🐞', 0, 0);
    ctx.shadowBlur = 0; ctx.restore();

    drawText('Flappy Coccinella', cx, cy - 42, 26, '#ff6bbd', '#7c004e', 10);
    drawText('Schiva le facce · Vola alto', cx, cy - 6, 13, '#c084fc');
    drawText('Record: ' + bestScore + ' 🏆', cx, cy + 24, 15, '#ffd700', '#7c4d00', 5);

    /* bottone */
    var bw = 200, bh = 52, bx = cx - 100, by = cy + 54;
    var bg = ctx.createLinearGradient(bx, by, bx + bw, by + bh);
    bg.addColorStop(0, '#ff6bbd'); bg.addColorStop(1, '#a855f7');
    ctx.fillStyle = '#7c004e';
    roundRect(bx, by + 6, bw, bh, 26); ctx.fill();
    ctx.fillStyle = bg;
    roundRect(bx, by, bw, bh, 26); ctx.fill();
    drawText('GIOCA!', cx, by + bh / 2, 24, '#fff', '#7c004e', 8);
    drawText('Clicca · Spazio · Touch', cx, cy + 140, 12, 'rgba(168,85,247,0.6)');
  }

  /* ── MORTE ── */
  function drawDeath() {
    var alpha = Math.min(1, (deathTimer - 20) / 35);
    if (alpha <= 0) return;
    ctx.globalAlpha = alpha;

    var cx = W / 2, cy = H / 2 - 10;
    var g = ctx.createLinearGradient(cx - 155, cy - 155, cx + 155, cy + 155);
    g.addColorStop(0, 'rgba(45,10,94,0.97)');
    g.addColorStop(1, 'rgba(20,4,50,0.98)');
    ctx.fillStyle = g;
    roundRect(cx - 160, cy - 160, 320, 320, 24); ctx.fill();
    ctx.strokeStyle = '#ff6bbd'; ctx.lineWidth = 2.5;
    ctx.shadowColor = '#ff6bbd'; ctx.shadowBlur = 22;
    roundRect(cx - 160, cy - 160, 320, 320, 24); ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.font = '60px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff'; ctx.fillText(deathEmoji, cx, cy - 95);

    drawText(deathTitle, cx, cy - 48, 24, '#ff6bbd', '#7c004e', 10);

    var stars = score < 5 ? '⭐' : score < 15 ? '⭐⭐' : '⭐⭐⭐';
    ctx.font = '28px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff'; ctx.fillText(stars, cx, cy - 10);

    ctx.globalAlpha = alpha * 0.9;
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    roundRect(cx - 148, cy + 20, 132, 60, 12); ctx.fill();
    roundRect(cx + 16, cy + 20, 132, 60, 12); ctx.fill();
    ctx.globalAlpha = alpha;

    drawText('PUNTEGGIO', cx - 82, cy + 36, 10, '#c084fc');
    drawText(String(score), cx - 82, cy + 60, 28, '#fff', '#000', 5);
    drawText('RECORD', cx + 82, cy + 36, 10, '#c084fc');
    drawText(String(bestScore), cx + 82, cy + 60, 28, '#ffd700', '#7c4d00', 5);

    var pw = 200, ph = 50, px = cx - 100, py = cy + 96;
    var pg = ctx.createLinearGradient(px, py, px + pw, py + ph);
    pg.addColorStop(0, '#ff6bbd'); pg.addColorStop(1, '#a855f7');
    ctx.fillStyle = '#7c004e';
    roundRect(px, py + 5, pw, ph, 25); ctx.fill();
    ctx.fillStyle = pg;
    roundRect(px, py, pw, ph, 25); ctx.fill();
    drawText('RIPROVA!', cx, py + ph / 2, 22, '#fff', '#7c004e', 8);

    if (killerTxt) drawText(killerTxt, cx, cy + 158, 13, '#a78bfa');
    if (deathTimer > 80) drawText('clicca o premi Spazio', cx, cy + 176, 11, 'rgba(255,255,255,0.4)');

    ctx.globalAlpha = 1;
  }

  /* ── HUD ── */
  function drawHUD() {
    var pulse = 1 + Math.sin(frame * 0.3) * 0.025;
    ctx.save(); ctx.translate(W / 2, 36); ctx.scale(pulse, pulse);
    drawText(String(score), 0, 0, 52, '#fff', '#c4007a', 12);
    ctx.restore();

    ctx.font = '22px serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    for (var k = 0; k < 3; k++) {
      ctx.globalAlpha = k < lives ? 1 : 0.22;
      ctx.shadowColor = '#ff6bbd'; ctx.shadowBlur = k < lives ? 8 : 0;
      ctx.fillStyle = '#fff';
      ctx.fillText('🐞', 14 + k * 30, 30);
      ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;
  }

  /* ══════════════════════════════════════════════════
     LOOP
  ══════════════════════════════════════════════════ */
  function loop() {
    frame++;
    drawBG();

    /* PLAYING */
    if (state === 'playing') {
      pipeTimer++;
      if (pipeTimer >= PIPE_EVERY) { spawnPipe(); pipeTimer = 0; }

      /* muovi pipe */
      for (var k = 0; k < pipes.length; k++) {
        pipes[k].x -= pipeSpeed;
        pipes[k].wobble = Math.max(0, pipes[k].wobble - 0.04);
      }
      /* rimuovi fuori schermo */
      var alive = [];
      for (var k = 0; k < pipes.length; k++) {
        if (pipes[k].x + PW > -20) alive.push(pipes[k]);
      }
      pipes = alive;

      /* disegna pipe */
      for (var k = 0; k < pipes.length; k++) drawPipe(pipes[k]);

      /* punteggio */
      for (var k = 0; k < pipes.length; k++) {
        if (!pipes[k].scored && pipes[k].x + PW < Bx) {
          pipes[k].scored = true;
          score++;
          pipeSpeed = SPD_BASE + score * 0.045;
          spawnPart(Bx, By - 30, '#ffd700', 10, 4);
          spawnPart(Bx, By - 30, '#ff6bbd', 6, 2.5);
        }
      }

      /* fisica */
      Bvy = Math.min(Bvy + 0.38, 10);
      By += Bvy;
      Brot = Math.max(-0.5, Math.min(1.2, Bvy * 0.09));
      Bwing += 0.35;
      if (Binv > 0) Binv--;

      if (By - Br < 0 || By + Br > H) handleDeath();

      if (Binv === 0) {
        for (var k = 0; k < pipes.length; k++) {
          if (checkColl(pipes[k])) { pipes[k].wobble = 1; handleHit(); break; }
        }
      }

      drawBird();
      drawHUD();
    }

    /* DEAD */
    else if (state === 'dead') {
      deathTimer++;
      for (var k = 0; k < pipes.length; k++) drawPipe(pipes[k]);
      Bvy = Math.min(Bvy + 0.57, 12);
      By += Bvy;
      Brot = Math.min(Brot + 0.1, Math.PI * 0.65);
      drawBird();
      drawDeath();
    }

    /* MENU */
    else {
      By = 300 + Math.sin(frame * 0.055) * 14;
      Bwing += 0.22;
      Brot = Math.sin(frame * 0.055) * 0.15;
      drawBird();
      drawMenu();
    }

    /* particelle */
    var aliveP = [];
    for (var k = 0; k < particles.length; k++) {
      var p = particles[k];
      p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life -= p.decay;
      if (p.life > 0) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.col;
        ctx.shadowColor = p.col; ctx.shadowBlur = 8;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.sz * p.life, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
        aliveP.push(p);
      }
    }
    ctx.globalAlpha = 1;
    particles = aliveP;

    requestAnimationFrame(loop);
  }

  /* ── INPUT ── */
  function flap() {
    if (state === 'menu')    { startGame(); return; }
    if (state === 'dead')    { if (deathTimer > 80) startGame(); return; }
    if (state !== 'playing') return;
    Bvy = -7.8;
    spawnPart(Bx - 10, By + 10, '#c084fc', 6, 2.5);
  }

  canvas.addEventListener('click', flap);
  canvas.addEventListener('touchstart', function(e) { e.preventDefault(); flap(); }, { passive: false });
  document.addEventListener('keydown', function(e) {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
  });

  loop();
})();
</script>
</body>
</html>
